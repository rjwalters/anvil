# anvil/lib/marp/config.yml
#
# Canonical Marp configuration shared by anvil:deck and anvil:slides.
# Pinned at the framework level per CLAUDE.md (Presentation renderer).
#
# Consumed via Marp CLI's native --config-file flag, e.g.:
#
#   marp <thread>.{N}/deck.md \
#     --pdf \
#     --html \
#     --config-file anvil/lib/marp/config.yml \
#     --output <thread>.{N}/deck.pdf
#
# In an installed consumer repo this path resolves to
# .anvil/lib/marp/config.yml (the install script copies anvil/lib/ wholesale).
#
# This file is the CLI-side companion to the per-document frontmatter pin.
# Per-deck frontmatter still pins `math: mathjax` and `html: true` explicitly
# (see anvil/skills/{deck,slides}/templates/deck.md.j2) so a deck.md checked
# into a consumer repo renders correctly under `marp deck.md --pdf` even
# without this config file. Belt-and-suspenders by design — when the two pins
# disagree, the frontmatter wins (Marp's own precedence rule).
#
# What is pinned and why:
#
#   html: true
#     Required so inline <script>/HTML blocks survive into the rendered
#     HTML/PDF output. Without it, fenced ```mermaid blocks (which Marp
#     turns into <script> blocks) silently drop. This is the load-bearing
#     enabler for the inline-mermaid-default decision documented in
#     anvil/skills/{deck,slides}/commands/{deck,slides}-figures.md.
#
#   allowLocalFiles: true
#     Required for Marp to inline local image references (figures/*.png,
#     assets/*.png). Without it, every `![](figures/foo.png)` reference
#     renders as a broken-image icon in the PDF.
#
#   themeSet: <both shipped themes>
#     The shipped deck and slides themes are referenced by name in the
#     per-document frontmatter (`theme: anvil-deck`, `theme:
#     anvil-slides-theme`). Listing them here lets Marp resolve those names
#     without a `--theme-set` flag on the CLI side. Consumer overrides at
#     .anvil/skills/{deck,slides}/templates/<their-theme>.css are still
#     respected via the per-command --theme-set flag (which Marp merges
#     with this set).
#
# Math engine note: this config file does NOT set `math:` because Marp v3
# already defaults to MathJax. The per-document frontmatter pins the value
# explicitly to keep the source self-describing. If Marp's default ever
# changes again, add `math: mathjax` here and the frontmatter remains the
# authoritative pin.
options:
  allowLocalFiles: true
  html: true
  pdfNotes: false
  themeSet:
    - anvil/skills/deck/assets/anvil-deck.css
    - anvil/skills/slides/templates/anvil-slides-theme.css
