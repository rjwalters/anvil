# Customer context — HUMAN-OWNED. Agents read this file; they never
# rewrite it. It lives at <customers_dir>/<slug>/context.yaml where
# <customers_dir> defaults to <repo_root>/customers/ (override via the
# .anvil/config.json key report.customers_dir). A project opts in by
# declaring `customer: "<slug>"` in its _project.md frontmatter.
#
# The sibling file disclosures.jsonl is MACHINE-OWNED: report-promote
# appends one delivery record per promoted report version (append-only;
# idempotent on project/thread/version). Do not edit it by hand.
#
# Consulted by: report-draft (advisory — NDA scope and topics-to-avoid
# inform drafting), report-review and report-audit (enforcing — a draft
# passage discussing a topics_to_avoid entry is a CRITICAL flag:
# audit_disclosure_topic_violation), report-promote (ledger writer).

version: 1
customer: acme            # must match the directory slug

nda:
  scope: "Mutual NDA covering engagement deliverables and interview content."
  effective: "2026-01-15"

# none | ear99 | itar | <free text>
export_control: none

topics_to_avoid:
  - topic: "acquisition diligence findings"
    reason: "mid-acquisition; counsel hold"
  - topic: "unreleased roadmap items"
    reason: "NDA scope excludes forward-looking product plans"
